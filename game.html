<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <div class="container">
        <form class="round-form">
            <label class="round-number" for="round-number">Enter Round Number</label>
            <input id="round-number" type="number" placeholder="1">
            <button type="submit">Submit</button>
        </form>
        <!-- Image -->
        <div class="video">
            <img id="randomImg" src="rock.png" alt="Game Image">
        </div>

        <!-- Scores -->
        <div class="scores">
            <div class="score">
                <p>Andrew: <span id="bot-score">0</span></p>
            </div>
            <div class="score">
                <p>You: <span id="user-score">0</span></p>
            </div>
        </div>

        <!-- Play Button -->
        <button id="play-btn">Play</button>

    </div>

    <script src="game.js"></script>
</body>
</html>
