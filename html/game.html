<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="../css/game.css">
    <link rel="icon" href="/media/game.png" type="img">
</head>
<body>
    <!--Wrap and center page content in .container-->
    <div class="container">
        <!--Page Title-->
        <h1 class="title">Rock Paper Scissors</h1>

        <!--Rounds number controle-->
        <div class="rounds-container">
            <span id="roundpholder" class="round-def">Rounds</span>
            <button class="round-btn" id="decrease">−</button>
            <span class="round-number">3</span>
            <button class="round-btn" id="increase">+</button>
            <button class="start-btn" id="startGameBtn">Start Game</button>
        </div>

        <!--game information-->
        <div class="round-dashb hidden">
            <span id="roundText">Round 1 / 3</span>
        </div>

        <!--Main Game Area-->
        <div class="game-area">

            <div class="player-1">
                <span class="player-name">You</span>
                <div class="user-box">
                    <img id="user-choice" src="../media/paper.png" alt="Your choice">
                </div>
                <span class="score-value" id="user-score">0</span>
            </div>
            <div class="vs">VS</div>

            <div class="player-2">
                <span class="player-name">andrew</span>
                <div class="bot-box">
                    <img id="bot-choice" src="../media/rock.png" alt="Bot choice">
                </div>
                <span class="score-value" id="bot-score">0</span>
            </div>
        </div>

        <div class="choices">
            <button class="choice-btn" data-choice="rock">
                <img src="../media/rock.png" alt="Rock">
            </button>
            <button class="choice-btn" data-choice="paper">
                <img src="../media/paper.png" alt="Paper">
            </button>
            <button class="choice-btn" data-choice="scissors">
                <img src="../media/scissors.png" alt="Scissors">
            </button>
        </div>

        <p class="hint" id="hint">Choose your move!</p>
    </div>

    <div id="winner-panel" class="winner-panel hidden">
        <div class="winner-content">
            <h2 id="winner-text">Player Wins!</h2>
            <button id="close-winner">Play Again</button>
        </div>
    </div>

    <script src="../scripts/game.js"></script>
</body>
</html>
